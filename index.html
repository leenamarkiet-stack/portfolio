<style>
  html, body { margin: 0; padding: 0; background: #FFEDCE; font-family: Inter, sans-serif; }
  *, *::before, *::after { box-sizing: border-box; }
  @keyframes blob1 {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(-60px, 30px) scale(1.1); }
    66%  { transform: translate(40px, -20px) scale(0.95); }
    100% { transform: translate(0, 0) scale(1); }
  }
  @keyframes blob2 {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(50px, -40px) scale(0.9); }
    66%  { transform: translate(-30px, 50px) scale(1.15); }
    100% { transform: translate(0, 0) scale(1); }
  }
  @keyframes blob3 {
    0%   { transform: translate(0, 0) scale(1); }
    50%  { transform: translate(80px, 20px) scale(1.08); }
    100% { transform: translate(0, 0) scale(1); }
  }
  .blob-a { animation: blob1 22s ease-in-out infinite; }
  .blob-b { animation: blob2 28s ease-in-out infinite; }
  .blob-c { animation: blob3 18s ease-in-out infinite; }

  /* Mobile responsive */
  .hero-pad { /* padding moved to .hero-screen so screens can slide */ }
  .content-pad { padding: 64px 64px 96px; }
  .hero-grid {
    display: grid;
    grid-template-columns: minmax(360px, 540px) 200px minmax(360px, 1fr);
    grid-template-rows: auto auto;
    column-gap: 32px; row-gap: 28px;
    align-items: start;
  }
  .bio-top    { grid-column: 1; grid-row: 1; }
  .hero-photo { grid-column: 2; grid-row: 1; }
  .bio-bottom { grid-column: 1 / 3; grid-row: 2; }       /* paragraph + buttons stretch under the photo */
  .hero-timeline { grid-column: 3; grid-row: 1 / -1; }    /* timeline spans both rows on the right */
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .name-h1 { font-size: 76px; }
  @media (max-width: 1180px) {
    .hero-grid { grid-template-columns: 1fr 200px; }
    .bio-top { grid-column: 1; }
    .hero-photo { grid-column: 2; }
    .bio-bottom { grid-column: 1 / -1; }
    .hero-timeline { grid-column: 1 / -1; grid-row: auto; margin-top: 16px; margin-bottom: 0 !important; }
  }
  @media (max-width: 900px) {
    .grid-4 { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 720px) {
    .content-pad { padding: 40px 20px 64px; }
    .hero-grid { grid-template-columns: 1fr; gap: 24px; }
    .hero-photo { width: 140px !important; height: 168px !important; }
    .name-h1 { font-size: 44px !important; }
    .meta-bar { flex-direction: column; align-items: flex-start !important; gap: 8px; }
    .footer-bar { flex-direction: column; gap: 12px; align-items: flex-start !important; }
  }
  @media (max-width: 480px) {
    .grid-4 { grid-template-columns: 1fr; }
    .name-h1 { font-size: 36px !important; }
  }

  /* Hero slide stage: screen 1 (original hero) and screen 2 (full timeline) */
  .hero-stage {
    display: flex; width: 200%;
    transition: transform .55s cubic-bezier(0.32, 0.72, 0, 1);
  }
  .hero-stage.expanded { transform: translateX(-50%); }
  .hero-screen {
    flex: 0 0 50%; min-width: 50%; box-sizing: border-box;
    padding: 40px 64px 96px;
    position: relative;
  }
  .hero-screen-timeline {
    display: flex; flex-direction: column;
    justify-content: flex-end; align-items: stretch;
  }
  .hero-close {
    position: absolute; top: 18px; right: 64px; z-index: 5;
    background: rgba(255,250,240,0.9); backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.7); border-radius: 999px;
    padding: 7px 14px; font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--forest, #546B41);
    cursor: pointer; font-family: Inter, sans-serif;
    box-shadow: 0 4px 10px -4px rgba(31,26,20,0.18);
  }
  .hero-close:hover { background: rgba(255,250,240,1); }
  .exp-full-wrap { width: 100%; }

  /* Experience timeline (cards above continuous white line with dots + years) */
  .exp-panel { position: relative; min-width: 0; }
  .hero-timeline {
    align-self: end !important;
    /* Lift the timeline cards to align with the hero buttons row */
    margin-bottom: 48px;
  }
  .exp-label-row { display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; }
  .exp-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--forest, #546B41); opacity: 0.75; }
  .exp-toggle {
    background: rgba(255,250,240,0.85); backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.7); border-radius: 999px;
    padding: 5px 11px; font-size: 10px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--forest, #546B41);
    cursor: pointer; font-family: Inter, sans-serif;
    box-shadow: 0 4px 10px -4px rgba(31,26,20,0.18);
  }
  .exp-toggle:hover { background: rgba(255,250,240,0.95); }

  /* Grid-based timeline: cards row, markers row, years row.
     One continuous line spans the markers row across all columns. */
  .exp-grid {
    display: grid;
    grid-template-rows: 1fr 16px auto;
    row-gap: 8px; column-gap: 0;
    overflow-x: auto; overflow-y: hidden;
    padding: 4px 0 0;
    position: relative;
    scroll-snap-type: none;
    scrollbar-width: none;
    -ms-overflow-style: none;
    /* Default mask: fade both edges (cards trail off into the gradient on
       both sides). The component sets data-at-start / data-at-end so the
       fade on the relevant edge disappears when you reach that edge. */
    --fade: 70px;
    -webkit-mask-image: linear-gradient(to right,
      transparent 0, black var(--fade),
      black calc(100% - var(--fade)), transparent 100%);
            mask-image: linear-gradient(to right,
      transparent 0, black var(--fade),
      black calc(100% - var(--fade)), transparent 100%);
  }
  .exp-grid::-webkit-scrollbar { display: none; height: 0; width: 0; }
  .exp-grid[data-at-start="true"] {
    -webkit-mask-image: linear-gradient(to right, black 0, black calc(100% - var(--fade)), transparent 100%);
            mask-image: linear-gradient(to right, black 0, black calc(100% - var(--fade)), transparent 100%);
  }
  .exp-grid[data-at-end="true"] {
    -webkit-mask-image: linear-gradient(to right, transparent 0, black var(--fade), black 100%);
            mask-image: linear-gradient(to right, transparent 0, black var(--fade), black 100%);
  }
  .exp-grid[data-at-start="true"][data-at-end="true"] {
    -webkit-mask-image: none; mask-image: none;
  }
  /* Full timeline view: no fade ever */
  .hero-screen-timeline .exp-grid,
  .hero-screen-timeline .exp-grid[data-at-start],
  .hero-screen-timeline .exp-grid[data-at-end] {
    -webkit-mask-image: none; mask-image: none;
  }

  .exp-line {
    grid-row: 2; grid-column: 1 / -1;
    align-self: center; justify-self: stretch;
    height: 1.5px; background: rgba(255,255,255,0.92);
    margin: 0 110px; /* half of col width, so line starts/ends at first/last dot center */
    z-index: 0; pointer-events: none;
  }
  .exp-card-mini {
    grid-row: 1;
    background: rgba(255,250,240,0.82);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.7);
    border-radius: 10px; padding: 12px 14px 10px;
    box-shadow: 0 8px 22px -16px rgba(31,26,20,0.4);
    margin: 0 6px; min-height: 130px;
    scroll-snap-align: start;
  }
  .exp-card-head { display: flex; align-items: center; gap: 9px; margin-bottom: 8px; }
  .exp-card-logo { width: 30px; height: 30px; border-radius: 7px; overflow: hidden;
    background: linear-gradient(135deg, var(--peach, #FFC193), var(--coral, #FF8383));
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: var(--paper, #FFFAF0); flex-shrink: 0; }
  .exp-card-logo img { width: 100%; height: 100%; object-fit: cover; }
  .exp-card-co { font-size: 12.5px; font-weight: 600; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .exp-card-title { font-size: 12px; font-weight: 500; color: var(--ink);
    margin-bottom: 4px; line-height: 1.3; }
  .exp-card-desc { font-size: 11px; color: #3A332C; line-height: 1.4; }

  .exp-marker { grid-row: 2; z-index: 1;
    display: flex; align-items: center; justify-content: center; }
  .exp-dot {
    width: 10px; height: 10px; border-radius: 50%; background: #fff;
    box-shadow: 0 0 0 3px rgba(255,237,206,0.7);
  }
  .exp-year-label {
    grid-row: 3; text-align: center;
    font-size: 10px; color: var(--forest, #546B41);
    letter-spacing: 0.06em; text-transform: uppercase;
    white-space: nowrap;
  }

  /* Mobile timeline */
  @media (max-width: 720px) {
    .hero-screen { padding: 24px 20px 60px; }
    .hero-close { right: 20px; }
    .exp-grid {
      display: flex; flex-direction: column; gap: 10px;
      padding: 0;
    }
    .exp-card-mini { margin: 0; min-height: 0; }
    .exp-line, .exp-marker, .exp-year-label { display: none; }
  }
</style>

function tagColor(tag){
  let h=0; for(let i=0;i<tag.length;i++) h=(h*31+tag.charCodeAt(i))>>>0;

}

function loadData() {
  try {
    const s = localStorage.getItem('portfolio_data');
    if (s) {
      const d = JSON.parse(s);
      return {
        bio: { ...DEFAULT_BIO, ...(d.bio||{}) },
        skills: d.skills || DEFAULT_SKILLS,
        headerButtons: d.headerButtons || DEFAULT_HEADER_BUTTONS,
        experience: d.experience || DEFAULT_EXPERIENCE,
        projects: d.projects || DEFAULT_PROJECTS,
      };
    }
  } catch(e) {}
  return { bio:DEFAULT_BIO, skills:DEFAULT_SKILLS, headerButtons:DEFAULT_HEADER_BUTTONS,
           experience:DEFAULT_EXPERIENCE, projects:DEFAULT_PROJECTS };
}

const MONTHS_SHORT = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function expDate(m, y) {
  if (!y) return '—';
  return (m ? MONTHS_SHORT[m] + ' ' : '') + y;
}

function useReorderable(initial, key) {
  const ids = initial.map(i=>i.id);
  const [order, setOrder] = React.useState(() => {
    try { const s=localStorage.getItem(key); if(s){const p=JSON.parse(s);if(p.length===ids.length&&ids.every(id=>p.includes(id)))return p;} } catch(e){}
    return ids;
  });
  React.useEffect(()=>{ try{localStorage.setItem(key,JSON.stringify(order));}catch(e){} },[order]);
  const items = React.useMemo(()=>{const m=new Map(initial.map(i=>[i.id,i]));return order.map(id=>m.get(id)).filter(Boolean);},[initial,order]);
  const [dragId,setDragId]=React.useState(null);
  const [overId,setOverId]=React.useState(null);
  const dragProps = (id) => ({
    draggable:true,
    onDragStart:(e)=>{setDragId(id);e.dataTransfer.effectAllowed='move';},
    onDragOver:(e)=>{e.preventDefault();if(id!==overId)setOverId(id);},
    onDrop:(e)=>{e.preventDefault();if(!dragId||dragId===id){setDragId(null);setOverId(null);return;}
      setOrder(prev=>{const n=[...prev],from=n.indexOf(dragId),to=n.indexOf(id);if(from<0||to<0)return prev;n.splice(from,1);n.splice(to,0,dragId);return n;});
      setDragId(null);setOverId(null);},
    onDragEnd:()=>{setDragId(null);setOverId(null);},
    'data-drag-state':dragId===id?'dragging':(overId===id&&dragId?'over':''),
  });
  return {items,dragProps};
}

function GradBtn({href,primary,children}) {

    boxShadow:hov?`0 10px 24px -8px ${P.red}80`:`0 4px 10px -4px ${P.red}55`}}>{children}</a>;

    style={{...base,background:hov?`linear-gradient(135deg,${P.paper},${P.cream})`:'transparent',
    color:P.ink,border:`1px solid ${P.ink}30`}}>{children}</a>;
}

        </div>

          paddingTop:4,borderTop:`1px dashed ${P.ink}18`,marginTop:4}}>{p.role}</div>
      </div>
    </article>
  );
}

function yearLabelFor(x) {
  if (x.current) return 'Now';
  const m = MONTHS_SHORT[x.startMonth || 0];
  const y = x.startYear || '';
  return (m ? m + " '" : '') + (y ? String(y).slice(-2) : '');
}

// Smooth wheel-to-horizontal scroll: attach a wheel listener to a host element
// (e.g. the entire hero) and forward vertical wheel into smooth horizontal
// scroll on a target element resolved on each event (so it can pick the
// compact vs full timeline depending on state).
function useHostWheelToHorizontal(hostRef, getTargetEl, deps) {
  React.useEffect(() => {
    const host = hostRef.current;
    if (!host) return;
    let activeEl = null;
    let target = 0;
    let raf = null;
    const animate = () => {
      if (!activeEl) { raf = null; return; }
      const cur = activeEl.scrollLeft;
      const diff = target - cur;
      if (Math.abs(diff) < 0.5) {
        activeEl.scrollLeft = target;
        raf = null;
        return;
      }
      // ease-out toward target
      activeEl.scrollLeft = cur + diff * 0.16;
      raf = requestAnimationFrame(animate);
    };
    const onWheel = (e) => {
      const t = getTargetEl();
      if (!t) return;
      // re-sync when target changes or user has scrolled it via other means
      if (activeEl !== t) { activeEl = t; target = t.scrollLeft; }
      if (Math.abs(e.deltaY) <= Math.abs(e.deltaX)) return;
      const max = t.scrollWidth - t.clientWidth;
      const canRight = target < max - 1;
      const canLeft  = target > 0;
      if ((e.deltaY > 0 && canRight) || (e.deltaY < 0 && canLeft)) {
        e.preventDefault();
        target = Math.max(0, Math.min(max, target + e.deltaY * 0.9));
        if (!raf) raf = requestAnimationFrame(animate);
      }
    };
    host.addEventListener('wheel', onWheel, { passive: false });
    return () => {
      host.removeEventListener('wheel', onWheel);
      if (raf) cancelAnimationFrame(raf);
    };
  }, deps || []);
}

// Tag a scroll container with data-at-start / data-at-end so CSS can drop the
// edge fade when you've scrolled to that edge. Updates on scroll + resize.
function useScrollEdgeAttrs(ref, deps) {
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const update = () => {
      const max = Math.max(0, el.scrollWidth - el.clientWidth);
      el.dataset.atStart = (el.scrollLeft <= 1) ? 'true' : 'false';
      el.dataset.atEnd   = (max <= 1 || el.scrollLeft >= max - 1) ? 'true' : 'false';
    };
    update();
    el.addEventListener('scroll', update, { passive: true });
    window.addEventListener('resize', update);
    // Re-check after layout settles in (custom fonts, late content)
    const t = setTimeout(update, 100);
    return () => {
      el.removeEventListener('scroll', update);
      window.removeEventListener('resize', update);
      clearTimeout(t);
    };
  }, deps || []);
}

function TimelineGrid({experience, refTo}) {
  return (
    <div ref={refTo} className="exp-grid"
      style={{ gridTemplateColumns: `repeat(${experience.length}, 220px)` }}>
      <div className="exp-line"/>
      {experience.map((x, i) => (
        <div key={'c'+i} className="exp-card-mini" style={{ gridColumn: i+1 }}>
          <div className="exp-card-head">
            <div className="exp-card-logo">
              {x.logoUrl
                ? <img src={x.logoUrl} alt=""/>
                : (x.company||'?').charAt(0).toUpperCase()}
            </div>
            <div style={{minWidth:0,flex:1}}>
              <div className="exp-card-co">{x.company||'Company'}</div>
            </div>
          </div>
          <div className="exp-card-title">{x.title||''}</div>
          <div className="exp-card-desc">{x.description||''}</div>
        </div>
      ))}
      {experience.map((x, i) => (
        <div key={'m'+i} className="exp-marker" style={{ gridColumn: i+1 }}>
          <div className="exp-dot"/>
        </div>
      ))}
      {experience.map((x, i) => (
        <div key={'y'+i} className="exp-year-label" style={{ gridColumn: i+1 }}>
          {yearLabelFor(x)}
        </div>
      ))}
    </div>
  );
}

function Portfolio() {
  const {bio,skills,headerButtons,experience,projects}=loadData();
  const {items,dragProps}=useReorderable(projects,'portfolio-v1-order');
  const [expanded, setExpanded] = React.useState(false);
  const heroPadRef = React.useRef(null);
  const compactRef = React.useRef(null);
  const fullRef    = React.useRef(null);
  // One wheel handler on the entire hero — vertical wheel becomes smooth
  // horizontal scroll on whichever timeline is currently visible.
  useHostWheelToHorizontal(heroPadRef,
    () => expanded ? fullRef.current : compactRef.current,
    [expanded]);
  useScrollEdgeAttrs(compactRef, []);
  React.useEffect(() => {
    if (!expanded) return;
    const onKey = (e) => { if (e.key === 'Escape') setExpanded(false); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [expanded]);

  const hasExp = experience && experience.length > 0;

  return (
    <div style={{width:'100%',minHeight:'100%',background:P.cream,color:P.ink,fontFamily:'Inter,system-ui,sans-serif'}}>

      {/* HERO */}
      <div ref={heroPadRef} className="hero-pad" style={{background:heroGrad,position:'relative',overflow:'hidden'}}>
        <div aria-hidden className="blob-a" style={{position:'absolute',top:-120,right:-80,width:480,height:480,
          background:`radial-gradient(closest-side,${P.red}55,transparent 70%)`,filter:'blur(20px)',pointerEvents:'none',zIndex:0}}/>
        <div aria-hidden className="blob-b" style={{position:'absolute',bottom:-160,left:-120,width:520,height:520,
          background:`radial-gradient(closest-side,${P.sage}66,transparent 70%)`,filter:'blur(30px)',pointerEvents:'none',zIndex:0}}/>
        <div aria-hidden className="blob-c" style={{position:'absolute',top:80,left:'40%',width:360,height:360,
          background:`radial-gradient(closest-side,${P.peach}88,transparent 70%)`,filter:'blur(28px)',pointerEvents:'none',zIndex:0}}/>

        <div className={`hero-stage ${expanded ? 'expanded' : ''}`} style={{position:'relative',zIndex:1}}>

          {/* Screen 1 — original hero */}
          <div className="hero-screen">
            <div className="meta-bar" style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',
              fontSize:11,letterSpacing:'0.08em',textTransform:'uppercase',color:P.ink,
              borderBottom:`1px solid ${P.ink}22`,paddingBottom:14,marginBottom:56}}>
              <span style={{whiteSpace:'nowrap'}}>{bio.name.toLowerCase().replace(' ','.')} / portfolio</span>
              <span style={{whiteSpace:'nowrap'}}>2026 — {bio.location}</span>
            </div>

            <section className="hero-grid">
              <div className="bio-top" style={{paddingTop:4}}>
                {bio.status ? (
                  <div style={{display:'inline-flex',alignItems:'center',gap:8,fontSize:11,letterSpacing:'0.1em',
                    textTransform:'uppercase',color:P.forest,background:`${P.sage}66`,
                    padding:'6px 12px',borderRadius:999,whiteSpace:'nowrap',marginBottom:20}}>
                    <span style={{width:7,height:7,borderRadius:999,background:P.forest}}/>
                    {bio.status}
                  </div>
                ) : null}
                <h1 className="name-h1" style={{fontFamily:SERIF,fontWeight:400,lineHeight:1.0,
                  margin:0,letterSpacing:'-0.025em',color:P.ink}}>
                  {bio.name},<br/>
                  <em style={{fontStyle:'italic',background:`linear-gradient(120deg,${P.red},${P.forest})`,
                    WebkitBackgroundClip:'text',backgroundClip:'text',WebkitTextFillColor:'transparent'}}>
                    {bio.role.toLowerCase()}
                  </em>
                </h1>
              </div>
              <div className="hero-photo" style={{width:200,height:240,borderRadius:8,padding:4,
                background:`linear-gradient(160deg,${P.paper},${P.cream})`,
                boxShadow:`0 18px 40px -16px ${P.ink}33`}}>
                <div style={{width:'100%',height:'100%',borderRadius:6,overflow:'hidden',
                  background:`linear-gradient(135deg,${P.peach},${P.coral})`,
                  display:'flex',alignItems:'center',justifyContent:'center'}}>
                  {bio.photoUrl
                    ? <img src={bio.photoUrl} alt={bio.name} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                    : <span style={{fontSize:10,letterSpacing:'0.12em',color:P.paper,
                        background:`${P.ink}33`,padding:'4px 10px',borderRadius:999}}>PHOTO</span>}
                </div>
              </div>

              <div className="bio-bottom">
                <p style={{margin:0,fontSize:16,lineHeight:1.55,color:P.ink}}>{bio.paragraph}</p>
                <div style={{display:'flex',gap:10,marginTop:28,flexWrap:'wrap'}}>
                  {(headerButtons||[]).map((b,i)=>(
                    <GradBtn key={i} href={b.url||'#'} primary={!!b.primary}>{b.label||''} {b.primary?'↗':'↗'}</GradBtn>
                  ))}
                </div>
              </div>

              {hasExp && (
                <div className="hero-timeline">
                  <div className="exp-panel">
                    <div className="exp-label-row">
                      <div className="exp-label">Recent experience</div>
                      {experience.length > 2 && (
                        <button onClick={()=>setExpanded(true)} className="exp-toggle">Read more →</button>
                      )}
                    </div>
                    <TimelineGrid experience={experience} refTo={compactRef}/>
                  </div>
                </div>
              )}
            </section>
          </div>

          {/* Screen 2 — full timeline (no box, no title, just floats on the gradient) */}
          {hasExp && (
            <div className="hero-screen hero-screen-timeline">
              <button className="hero-close" onClick={()=>setExpanded(false)}>← Back</button>
              <div className="exp-full-wrap">
                <TimelineGrid experience={experience} refTo={fullRef}/>
              </div>
            </div>
          )}

        </div>
      </div>

      {/* CONTENT */}
      <div className="content-pad">
        <section style={{marginBottom:64}}>
          <SectionLabel num="01" title="Toolkit"/>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {(skills||[]).map(s=><span key={s} style={{
              fontSize:11,fontWeight:500,letterSpacing:'0.04em',
              padding:'7px 12px',borderRadius:999,whiteSpace:'nowrap',

              border:`1px solid ${P.peach}`,

            }}>{s}</span>)}

        </section>

        <section>
          <SectionLabel num="02" title="Selected work" hint="Drag any card to reorder ↔"/>
          <div className="grid-4">
            {items.map((p,idx)=><Card key={p.id} p={p} idx={idx} dragProps={dragProps(p.id)}/>)}
          </div>
        </section>

        <footer className="footer-bar" style={{marginTop:96,paddingTop:24,borderTop:`1px solid ${P.ink}22`,
          display:'flex',justifyContent:'space-between',alignItems:'center',
          fontSize:11,color:P.forest,letterSpacing:'0.06em',textTransform:'uppercase'}}>
          <span>© {bio.name}, 2026</span>
          <a href="admin.html"
            style={{color:P.forest,textDecoration:'none',fontSize:10,opacity:0.45,transition:'opacity .15s'}}
            onMouseEnter={e=>e.currentTarget.style.opacity=1}
            onMouseLeave={e=>e.currentTarget.style.opacity=0.45}>
            ⚙ Admin
          </a>
          <span>{bio.email}</span>
        </footer>
      </div>
    </div>
  );
}

// ───── Visitor gate ─────
async function sha256Hex(s){
  const b=new TextEncoder().encode(s);const h=await crypto.subtle.digest('SHA-256',b);
  return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('');
}
function VisitorGate({onPass}){
  const [pw,setPw]=React.useState('');
  const [err,setErr]=React.useState('');
  const submit=async(e)=>{
    e.preventDefault();
    const cfg=window.SITE_CONFIG||{};
    const expected=cfg.visitorHash||'';
    const h=await sha256Hex(pw);
    if(h===expected){
      sessionStorage.setItem('visitor_auth','1');
      onPass();
    }else setErr('Wrong password.');
  };
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',
      padding:20,background:`linear-gradient(135deg,${P.cream} 0%,${P.peach} 60%,${P.coral} 100%)`}}>
      <div style={{width:'100%',maxWidth:380,background:P.paper,borderRadius:14,padding:32,
        boxShadow:'0 20px 60px -20px rgba(0,0,0,0.25)'}}>
        <h1 style={{fontFamily:SERIF,fontWeight:400,fontSize:32,margin:'0 0 8px',letterSpacing:'-0.01em'}}>Welcome</h1>
        <p style={{margin:'0 0 24px',color:'rgba(31,26,20,0.6)',fontSize:13}}>Enter password to view this portfolio.</p>
        <form onSubmit={submit}>
          <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Password" autoFocus
            style={{width:'100%',padding:'11px 14px',borderRadius:8,border:`1px solid ${P.ink}1f`,
              fontFamily:'inherit',fontSize:14,outline:'none'}}/>
          {err && <div style={{color:P.red,fontSize:12,marginTop:10}}>{err}</div>}
          <button type="submit" style={{width:'100%',marginTop:14,padding:12,border:0,borderRadius:999,
            background:`linear-gradient(135deg,${P.coral},${P.red})`,color:P.paper,
            fontFamily:'inherit',fontSize:14,fontWeight:500,cursor:'pointer',
            boxShadow:`0 8px 20px -8px ${P.red}90`}}>Enter</button>
        </form>
      </div>
    </div>
  );
}
function Root(){
  const cfg=window.SITE_CONFIG||{};
  const needGate = !!(cfg.visitorProtect && cfg.visitorHash);
  const [authed,setAuthed]=React.useState(!needGate || sessionStorage.getItem('visitor_auth')==='1');
  if(!authed) return <VisitorGate onPass={()=>setAuthed(true)}/>;
  return <Portfolio/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
