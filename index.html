<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Leena Markiet — Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap">
<style>
  html, body { margin: 0; padding: 0; background: #FFEDCE; font-family: Inter, sans-serif; }
  *, *::before, *::after { box-sizing: border-box; }
  @keyframes blob1 {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(-60px, 30px) scale(1.1); }
    66%  { transform: translate(40px, -20px) scale(0.95); }
    100% { transform: translate(0, 0) scale(1); }
  }
  @keyframes blob2 {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(50px, -40px) scale(0.9); }
    66%  { transform: translate(-30px, 50px) scale(1.15); }
    100% { transform: translate(0, 0) scale(1); }
  }
  @keyframes blob3 {
    0%   { transform: translate(0, 0) scale(1); }
    50%  { transform: translate(80px, 20px) scale(1.08); }
    100% { transform: translate(0, 0) scale(1); }
  }
  .blob-a { animation: blob1 22s ease-in-out infinite; }
  .blob-b { animation: blob2 28s ease-in-out infinite; }
  .blob-c { animation: blob3 18s ease-in-out infinite; }

  /* Mobile responsive */
  .hero-pad { padding: 40px 64px 96px; }
  .content-pad { padding: 64px 64px 96px; }
  .hero-grid { display: grid; grid-template-columns: 200px 1fr; gap: 48px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .name-h1 { font-size: 76px; }
  @media (max-width: 900px) {
    .grid-4 { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 720px) {
    .hero-pad { padding: 24px 20px 64px; }
    .content-pad { padding: 40px 20px 64px; }
    .hero-grid { grid-template-columns: 1fr; gap: 24px; }
    .hero-photo { width: 140px !important; height: 168px !important; }
    .name-h1 { font-size: 44px !important; }
    .meta-bar { flex-direction: column; align-items: flex-start !important; gap: 8px; }
    .footer-bar { flex-direction: column; gap: 12px; align-items: flex-start !important; }
  }
  @media (max-width: 480px) {
    .grid-4 { grid-template-columns: 1fr; }
    .name-h1 { font-size: 36px !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const P = {
  cream:'#FFEDCE', peach:'#FFC193', coral:'#FF8383', red:'#FF3737',
  sage:'#C3CC9B', forest:'#546B41', ink:'#1F1A14', paper:'#FFFAF0'
};
const btnGrad  = `linear-gradient(135deg,${P.coral} 0%,${P.red} 100%)`;
const heroGrad = `linear-gradient(135deg,${P.cream} 0%,${P.peach} 60%,${P.coral} 100%)`;
const SERIF    = `"Instrument Serif", Georgia, serif`;

// Stable per-tag color: hash → palette
const TAG_PALETTES = [
  { bg:`${P.sage}55`,   fg:P.forest, br:`${P.forest}33` },
  { bg:`${P.peach}66`,  fg:'#8B4513', br:`${P.coral}55` },
  { bg:`${P.coral}33`,  fg:'#A02020', br:`${P.red}44` },
  { bg:`${P.cream}cc`,  fg:'#7A5C2F', br:`${P.peach}88` },
  { bg:'#D9E4C7',       fg:P.forest, br:`${P.sage}88` },
  { bg:'#FFE0E0',       fg:'#8A2A2A', br:`${P.coral}66` },
  { bg:'#F5DCC0',       fg:P.forest, br:`${P.peach}88` },
  { bg:'#E8D5B7',       fg:'#5C3A0F', br:`${P.peach}66` },
];
function tagColor(tag){
  let h=0; for(let i=0;i<tag.length;i++) h=(h*31+tag.charCodeAt(i))>>>0;
  return TAG_PALETTES[h % TAG_PALETTES.length];
}

const DEFAULT_BIO = {
  name:"Leena Markiet", role:"Service Designer & UX/UI",
  location:"Abu Dhabi, United Arab Emirates",
  email:"leena@markiet.studo",
  paragraph:"I'm a service designer and UX/UI lead with 8+ years shaping end-to-end experiences for healthcare, public sector, and fintech. I love untangling messy systems, facilitating cross-functional teams, and turning insight into shipped product. Currently freelancing.",
  skills:["Service Design","Journey Mapping","Workshop Facilitation","UX Research","UI Design","Digital Twins","Vibecoding","Figma","Stakeholder Management"],
  socials:[{label:"LinkedIn",url:"#"},{label:"Read.cv",url:"#"}],
};
const DEFAULT_PROJECTS = [
  {id:"p1",title:"Reimagining outpatient triage",client:"Nordic Health",role:"Lead Service Designer",year:"2025",tags:["Service Design","Healthcare","Research"],description:"End-to-end redesign of a triage flow used by 2,400 nurses across 14 hospitals.",cover:{hue:18,label:"Triage flow"}},
  {id:"p2",title:"A calmer banking app",client:"Pilvi Bank",role:"UX/UI Designer",year:"2024",tags:["UX/UI","Fintech","Mobile"],description:"Reduced support tickets by 31% with a redesigned daily-banking experience.",cover:{hue:200,label:"Mobile banking"}},
  {id:"p3",title:"Citizen permit service",client:"City of Tampere",role:"Service Designer",year:"2024",tags:["Service Design","Public Sector","Research"],description:"Cross-departmental service blueprint and digital application portal.",cover:{hue:140,label:"Permit service"}},
  {id:"p4",title:"Design system from scratch",client:"Verso (in-house)",role:"Design System Lead",year:"2023",tags:["Design System","UI","Tooling"],description:"Built and shipped a 240-component Figma library with token pipeline.",cover:{hue:280,label:"Design system"}},
  {id:"p5",title:"Onboarding for first-time investors",client:"Taimi Invest",role:"UX Designer",year:"2023",tags:["UX/UI","Fintech","Onboarding"],description:"Lifted activation by 22% with a friendlier, less jargon-heavy first-run.",cover:{hue:60,label:"Onboarding"}},
  {id:"p6",title:"Workshops in a box",client:"Self-initiated",role:"Designer & Facilitator",year:"2023",tags:["Service Design","Facilitation","Toolkit"],description:"Open-source toolkit for journey-mapping workshops, used by 600+ teams.",cover:{hue:340,label:"Workshop toolkit"}},
  {id:"p7",title:"Voice-first elderly care",client:"Hoiva Co.",role:"Service & UX Designer",year:"2022",tags:["Service Design","Voice UI","Accessibility"],description:"Voice companion piloted with 80 residents across three care homes.",cover:{hue:240,label:"Voice care"}},
  {id:"p8",title:"Restaurant ops dashboard",client:"Kitchn",role:"UI Designer",year:"2022",tags:["UX/UI","B2B","Data"],description:"Dense, glanceable dashboard for restaurant managers running multi-site ops.",cover:{hue:120,label:"Ops dashboard"}},
];

function loadData() {
  try {
    const s = localStorage.getItem('portfolio_data');
    if (s) { const d = JSON.parse(s); return { bio:d.bio||DEFAULT_BIO, projects:d.projects||DEFAULT_PROJECTS }; }
  } catch(e) {}
  return { bio:DEFAULT_BIO, projects:DEFAULT_PROJECTS };
}

function useReorderable(initial, key) {
  const ids = initial.map(i=>i.id);
  const [order, setOrder] = React.useState(() => {
    try { const s=localStorage.getItem(key); if(s){const p=JSON.parse(s);if(p.length===ids.length&&ids.every(id=>p.includes(id)))return p;} } catch(e){}
    return ids;
  });
  React.useEffect(()=>{ try{localStorage.setItem(key,JSON.stringify(order));}catch(e){} },[order]);
  const items = React.useMemo(()=>{const m=new Map(initial.map(i=>[i.id,i]));return order.map(id=>m.get(id)).filter(Boolean);},[initial,order]);
  const [dragId,setDragId]=React.useState(null);
  const [overId,setOverId]=React.useState(null);
  const dragProps = (id) => ({
    draggable:true,
    onDragStart:(e)=>{setDragId(id);e.dataTransfer.effectAllowed='move';},
    onDragOver:(e)=>{e.preventDefault();if(id!==overId)setOverId(id);},
    onDrop:(e)=>{e.preventDefault();if(!dragId||dragId===id){setDragId(null);setOverId(null);return;}
      setOrder(prev=>{const n=[...prev],from=n.indexOf(dragId),to=n.indexOf(id);if(from<0||to<0)return prev;n.splice(from,1);n.splice(to,0,dragId);return n;});
      setDragId(null);setOverId(null);},
    onDragEnd:()=>{setDragId(null);setOverId(null);},
    'data-drag-state':dragId===id?'dragging':(overId===id&&dragId?'over':''),
  });
  return {items,dragProps};
}

function GradBtn({href,primary,children}) {
  const [hov,setHov]=React.useState(false);
  const base={fontFamily:'Inter,sans-serif',fontSize:13,fontWeight:500,padding:'10px 16px',
    borderRadius:999,textDecoration:'none',display:'inline-block',
    transition:'transform .15s,box-shadow .15s',transform:hov?'translateY(-1px)':'none'};
  if(primary) return <a href={href} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
    style={{...base,background:btnGrad,color:P.paper,border:`1px solid ${P.red}`,
    boxShadow:hov?`0 10px 24px -8px ${P.red}80`:`0 4px 10px -4px ${P.red}55`}}>{children}</a>;
  return <a href={href} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
    style={{...base,background:hov?`linear-gradient(135deg,${P.paper},${P.cream})`:'transparent',
    color:P.ink,border:`1px solid ${P.ink}30`}}>{children}</a>;
}

function SectionLabel({num,title,hint}) {
  return (
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:24,gap:16}}>
      <div style={{display:'flex',alignItems:'baseline',gap:16}}>
        <span style={{fontSize:11,letterSpacing:'0.1em',fontWeight:600,
          background:`linear-gradient(135deg,${P.coral},${P.red})`,
          WebkitBackgroundClip:'text',backgroundClip:'text',WebkitTextFillColor:'transparent'}}>{num}</span>
        <h2 style={{fontFamily:SERIF,fontWeight:400,fontSize:32,margin:0,letterSpacing:'-0.01em',color:P.ink}}>{title}</h2>
      </div>
      {hint&&<span style={{fontSize:10,letterSpacing:'0.1em',color:P.forest,textTransform:'uppercase',whiteSpace:'nowrap'}}>{hint}</span>}
    </div>
  );
}

const COVERS=[
  `linear-gradient(135deg,${P.peach},${P.coral})`,`linear-gradient(135deg,${P.sage},${P.forest})`,
  `linear-gradient(135deg,${P.cream},${P.peach})`,`linear-gradient(135deg,${P.coral},${P.red})`,
  `linear-gradient(135deg,${P.peach},${P.sage})`,`linear-gradient(135deg,${P.red},${P.forest})`,
  `linear-gradient(135deg,${P.sage},${P.peach})`,`linear-gradient(135deg,${P.forest},${P.coral})`,
];

function Card({p,idx,dragProps}) {
  const [hov,setHov]=React.useState(false);
  const dragging=dragProps['data-drag-state']==='dragging';
  const over=dragProps['data-drag-state']==='over';
  return (
    <article {...dragProps}
      onClick={()=>window.location.href=`article.html?id=${p.id}`}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{background:P.paper,border:`1px solid ${P.ink}12`,borderRadius:8,overflow:'hidden',
        cursor:'pointer',opacity:dragging?0.4:1,
        transform:over?'translateX(6px)':hov?'translateY(-3px)':'none',
        transition:'transform .18s ease,box-shadow .18s ease',
        boxShadow:hov?`0 18px 36px -16px ${P.ink}40`:`0 1px 0 ${P.ink}08`,
        display:'flex',flexDirection:'column',userSelect:'none'}}>
      <div style={{position:'relative',aspectRatio:'4/3',background:COVERS[idx%COVERS.length]}}>
        <div aria-hidden style={{position:'absolute',inset:0,
          backgroundImage:`repeating-linear-gradient(135deg,${P.paper}22 0 12px,transparent 12px 24px)`}}/>
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <span style={{fontSize:10.5,letterSpacing:'0.08em',color:P.ink,textTransform:'uppercase',
            padding:'5px 11px',borderRadius:999,background:`${P.paper}cc`,backdropFilter:'blur(2px)'}}>
            {p.cover.label}
          </span>
        </div>
        <span style={{position:'absolute',top:8,left:8,fontSize:10,padding:'3px 8px',borderRadius:999,background:P.paper,color:P.ink}}>
          {String(idx+1).padStart(2,'0')}
        </span>
        <span style={{position:'absolute',top:8,right:8,fontSize:10,fontWeight:500,padding:'3px 8px',
          borderRadius:999,color:P.paper,background:`linear-gradient(135deg,${P.coral},${P.red})`}}>
          {p.year}
        </span>
      </div>
      <div style={{padding:'14px 14px 16px',display:'flex',flexDirection:'column',gap:8,flex:1}}>
        <h3 style={{fontFamily:SERIF,fontWeight:400,fontSize:20,margin:0,lineHeight:1.2,color:P.ink}}>{p.title}</h3>
        <p style={{margin:0,fontSize:12.5,lineHeight:1.45,color:P.ink}}>{p.description}</p>
        <div style={{marginTop:'auto',paddingTop:8,display:'flex',flexWrap:'wrap',gap:4}}>
          {p.tags.map(t=>{const c=tagColor(t);return <span key={t} style={{fontSize:11,fontWeight:500,letterSpacing:'0.03em',padding:'3px 9px',
            borderRadius:4,whiteSpace:'nowrap',background:c.bg,color:c.fg,border:`1px solid ${c.br}`}}>{t}</span>;})}
        </div>
        <div style={{fontSize:10,color:P.forest,letterSpacing:'0.06em',textTransform:'uppercase',
          paddingTop:4,borderTop:`1px dashed ${P.ink}18`,marginTop:4}}>{p.role}</div>
      </div>
    </article>
  );
}

function Portfolio() {
  const {bio,projects}=loadData();
  const {items,dragProps}=useReorderable(projects,'portfolio-v1-order');
  return (
    <div style={{width:'100%',minHeight:'100%',background:P.cream,color:P.ink,fontFamily:'Inter,system-ui,sans-serif'}}>

      {/* HERO */}
      <div className="hero-pad" style={{background:heroGrad,position:'relative',overflow:'hidden'}}>
        <div aria-hidden className="blob-a" style={{position:'absolute',top:-120,right:-80,width:480,height:480,
          background:`radial-gradient(closest-side,${P.red}55,transparent 70%)`,filter:'blur(20px)',pointerEvents:'none'}}/>
        <div aria-hidden className="blob-b" style={{position:'absolute',bottom:-160,left:-120,width:520,height:520,
          background:`radial-gradient(closest-side,${P.sage}66,transparent 70%)`,filter:'blur(30px)',pointerEvents:'none'}}/>
        <div aria-hidden className="blob-c" style={{position:'absolute',top:80,left:'40%',width:360,height:360,
          background:`radial-gradient(closest-side,${P.peach}88,transparent 70%)`,filter:'blur(28px)',pointerEvents:'none'}}/>

        <div className="meta-bar" style={{position:'relative',display:'flex',justifyContent:'space-between',alignItems:'baseline',
          fontSize:11,letterSpacing:'0.08em',textTransform:'uppercase',color:P.ink,
          borderBottom:`1px solid ${P.ink}22`,paddingBottom:14,marginBottom:56}}>
          <span style={{whiteSpace:'nowrap'}}>{bio.name.toLowerCase().replace(' ','.')} / portfolio</span>
          <span style={{whiteSpace:'nowrap'}}>2026 — {bio.location}</span>
        </div>

        <section className="hero-grid" style={{position:'relative',alignItems:'start'}}>
          <div className="hero-photo" style={{width:200,height:240,borderRadius:8,padding:4,
            background:`linear-gradient(160deg,${P.paper},${P.cream})`,
            boxShadow:`0 18px 40px -16px ${P.ink}33`}}>
            <div style={{width:'100%',height:'100%',borderRadius:6,
              background:`linear-gradient(135deg,${P.peach},${P.coral})`,
              display:'flex',alignItems:'center',justifyContent:'center'}}>
              <span style={{fontSize:10,letterSpacing:'0.12em',color:P.paper,
                background:`${P.ink}33`,padding:'4px 10px',borderRadius:999}}>PHOTO</span>
            </div>
          </div>
          <div style={{paddingTop:4}}>
            <div style={{display:'inline-flex',alignItems:'center',gap:8,fontSize:11,letterSpacing:'0.1em',
              textTransform:'uppercase',color:P.forest,background:`${P.sage}66`,
              padding:'6px 12px',borderRadius:999,whiteSpace:'nowrap',marginBottom:20}}>
              <span style={{width:7,height:7,borderRadius:999,background:P.forest}}/>
              Available for projects, summer 2026
            </div>
            <h1 className="name-h1" style={{fontFamily:SERIF,fontWeight:400,lineHeight:1.0,
              margin:0,letterSpacing:'-0.025em',color:P.ink}}>
              {bio.name},<br/>
              <em style={{fontStyle:'italic',background:`linear-gradient(120deg,${P.red},${P.forest})`,
                WebkitBackgroundClip:'text',backgroundClip:'text',WebkitTextFillColor:'transparent'}}>
                {bio.role.toLowerCase()}
              </em>
            </h1>
            <p style={{maxWidth:600,marginTop:24,fontSize:16,lineHeight:1.55,color:P.ink}}>{bio.paragraph}</p>
            <div style={{display:'flex',gap:10,marginTop:28,flexWrap:'wrap'}}>
              <GradBtn href={`mailto:${bio.email}`} primary>{bio.email} ↗</GradBtn>
              <GradBtn href="#">Download CV ↓</GradBtn>
              {bio.socials.map(s=><GradBtn key={s.label} href={s.url}>{s.label} ↗</GradBtn>)}
            </div>
          </div>
        </section>
      </div>

      {/* CONTENT */}
      <div className="content-pad">
        <section style={{marginBottom:64}}>
          <SectionLabel num="01" title="Toolkit"/>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {bio.skills.map(s=><span key={s} style={{
              fontSize:11,fontWeight:500,letterSpacing:'0.04em',
              padding:'7px 12px',borderRadius:999,whiteSpace:'nowrap',
              color:P.ink,
              background:`linear-gradient(135deg,${P.cream} 0%,${P.peach} 100%)`,
              border:`1px solid ${P.peach}`,
              boxShadow:`0 4px 10px -4px ${P.peach}66`,
            }}>{s}</span>)}
          </div>
        </section>

        <section>
          <SectionLabel num="02" title="Selected work" hint="Drag any card to reorder ↔"/>
          <div className="grid-4">
            {items.map((p,idx)=><Card key={p.id} p={p} idx={idx} dragProps={dragProps(p.id)}/>)}
          </div>
        </section>

        <footer className="footer-bar" style={{marginTop:96,paddingTop:24,borderTop:`1px solid ${P.ink}22`,
          display:'flex',justifyContent:'space-between',alignItems:'center',
          fontSize:11,color:P.forest,letterSpacing:'0.06em',textTransform:'uppercase'}}>
          <span>© {bio.name}, 2026</span>
          <a href="admin.html"
            style={{color:P.forest,textDecoration:'none',fontSize:10,opacity:0.45,transition:'opacity .15s'}}
            onMouseEnter={e=>e.currentTarget.style.opacity=1}
            onMouseLeave={e=>e.currentTarget.style.opacity=0.45}>
            ⚙ Admin
          </a>
          <span>{bio.email}</span>
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Portfolio/>);
</script>
</body>
</html>
