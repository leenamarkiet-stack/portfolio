<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Case Study — Leena Markiet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap">
<style>
  :root { --cream:#FFEDCE; --peach:#FFC193; --coral:#FF8383; --red:#FF3737;
    --sage:#C3CC9B; --forest:#546B41; --ink:#1F1A14; --paper:#FFFAF0; }
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: var(--cream); color: var(--ink);
    font-family: Inter, system-ui, sans-serif; }
  img { display: block; max-width: 100%; height: auto; }

  @keyframes blob1 { 0%,100%{transform:translate(0,0) scale(1);} 33%{transform:translate(-60px,30px) scale(1.1);} 66%{transform:translate(40px,-20px) scale(0.95);} }
  @keyframes blob2 { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(60px,40px) scale(1.1);} }
  .blob-a { animation: blob1 22s ease-in-out infinite; }
  .blob-b { animation: blob2 26s ease-in-out infinite; }

  /* Header */
  .hd { padding:14px 48px; position:sticky; top:0; z-index:100;
    background:rgba(255,237,206,0.92); backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(0,0,0,0.08);
    display:flex; justify-content:space-between; align-items:center; gap:12px; }
  .hd a { color: var(--forest); text-decoration:none; font-size:11px;
    letter-spacing:0.1em; text-transform:uppercase; }
  .hd a:hover { color: var(--ink); }

  .container { max-width: 1080px; margin: 0 auto; }

  /* Hero */
  .hero { padding:48px 64px 36px;
    background: linear-gradient(135deg, var(--cream) 0%, var(--peach) 60%, var(--coral) 100%);
    position:relative; overflow:hidden; }
  .hero-content { position:relative; max-width:760px; }
  .hero-tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:18px; }
  .hero-tag { font-size:11px; padding:4px 10px; border-radius:999px;
    background:rgba(255,250,240,0.85); color: var(--ink); font-weight:500; }
  .hero-h1 { font-family:'Instrument Serif',Georgia,serif; font-weight:400;
    font-size:52px; line-height:1.05; letter-spacing:-0.02em; margin:0; color: var(--ink); }
  .hero-overview { margin:18px 0 0; font-size:16px; line-height:1.55; color: var(--ink); max-width:640px; }
  .meta-grid { margin-top:28px; display:grid; grid-template-columns:repeat(5,1fr); gap:14px;
    padding-top:18px; border-top:1px dashed rgba(31,26,20,0.25); }
  .meta-k { font-size:10px; letter-spacing:0.1em; color: var(--forest);
    text-transform:uppercase; margin-bottom:2px; }
  .meta-v { font-size:13px; color: var(--ink); }

  /* Hero image (optional) */
  .hero-img-wrap { padding: 0 64px; }
  .hero-img { aspect-ratio: 16/6; max-height: 360px; width:100%;
    border-radius: 0 0 8px 8px; overflow:hidden;
    border:1px solid rgba(0,0,0,0.06); border-top:none; cursor:zoom-in; }
  .hero-img img { width:100%; height:100%; object-fit:cover; }

  /* Body */
  .body { padding: 56px 64px 80px; }

  /* Section */
  .section { margin-bottom: 64px; }
  .section-head { display:flex; align-items:baseline; gap:14px; margin-bottom: 14px; }
  .section-num { font-size:11px; letter-spacing:0.1em; font-weight:600;
    background: linear-gradient(135deg, var(--coral), var(--red));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .section-h2 { font-family:'Instrument Serif',Georgia,serif; font-weight:400;
    font-size:28px; letter-spacing:-0.01em; margin:0; color: var(--ink); }
  .section-body { font-size:15px; line-height:1.65; color:#3A332C; max-width:640px;
    margin: 0 0 18px; }

  /* Layouts */
  .layout-media { display:grid; gap:28px; align-items:start; }
  .layout-media-left  { grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr); }
  .layout-media-right { grid-template-columns: minmax(0, 1fr) minmax(0, 1.05fr); }
  .main-image-wrap { position:relative; aspect-ratio: 4/3; max-height: 380px;
    border-radius:8px; overflow:hidden; border:1px solid rgba(0,0,0,0.08);
    background:#fff; cursor:zoom-in; transition: transform .2s ease; }
  .main-image-wrap:hover { transform: translateY(-2px); box-shadow: 0 14px 30px -16px rgba(0,0,0,0.3); }
  .main-image-wrap img { width:100%; height:100%; object-fit:cover; }
  .main-image-cap { font-size:11px; color: var(--forest); margin-top:6px;
    letter-spacing:0.04em; }

  /* Smaller image grid */
  .extra-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; margin-top: 24px; }
  .extra-item { display:flex; flex-direction:column; gap:6px; }
  .extra-thumb { aspect-ratio: 4/3; max-height: 180px; border-radius:6px; overflow:hidden;
    border:1px solid rgba(0,0,0,0.08); background:#fff;
    cursor:zoom-in; transition: transform .2s ease; }
  .extra-thumb:hover { transform: translateY(-2px); box-shadow: 0 10px 22px -14px rgba(0,0,0,0.3); }
  .extra-thumb img { width:100%; height:100%; object-fit:cover; }
  .extra-cap { font-size:11px; color: var(--forest); letter-spacing:0.02em; line-height:1.35; }

  .gallery-grid { display:grid; grid-template-columns: repeat(3,1fr); gap:14px; }

  /* Outro */
  .outro { padding-top:24px; border-top:1px solid rgba(0,0,0,0.12);
    display:flex; justify-content:space-between; align-items:center; gap:14px; flex-wrap:wrap; }
  .outro-end { font-size:11px; letter-spacing:0.08em; color:#5C544A; text-transform:uppercase; }
  .cta { font-size:13px; font-weight:500; padding:10px 18px; border-radius:999px;
    background: linear-gradient(135deg, var(--coral), var(--red)); color: var(--paper);
    text-decoration:none; box-shadow:0 8px 20px -8px rgba(255,55,55,0.5); }

  /* Placeholder */
  .ph { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
  .ph span { font-size:10px; letter-spacing:0.08em; text-transform:uppercase;
    color:rgba(255,255,255,0.92); padding:5px 10px; border-radius:999px;
    background: rgba(0,0,0,0.18); }

  /* Lightbox */
  .lb { position:fixed; inset:0; background: rgba(0,0,0,0.92); z-index:9999;
    display:none; align-items:center; justify-content:center; padding:24px; cursor:zoom-out; }
  .lb.show { display:flex; }
  .lb img { max-width:95vw; max-height:90vh; border-radius:6px; }
  .lb-cap { position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
    color:#fff; font-size:12px; letter-spacing:0.06em; text-transform:uppercase;
    background: rgba(255,255,255,0.1); padding:6px 12px; border-radius:999px; }
  .lb-x { position:absolute; top:18px; right:24px; color:#fff; font-size:24px;
    background:transparent; border:0; cursor:pointer; opacity:0.6; }
  .lb-x:hover { opacity:1; }

  /* Mobile */
  @media (max-width: 760px) {
    .hd { padding:12px 20px; flex-wrap:wrap; }
    .hd a { font-size:10px; }
    .hero { padding:32px 20px 28px; }
    .hero-img-wrap { padding: 0 20px; }
    .hero-h1 { font-size: 34px; }
    .hero-overview { font-size:15px; }
    .meta-grid { grid-template-columns: repeat(2,1fr); }
    .body { padding: 40px 20px 60px; }
    .section { margin-bottom: 44px; }
    .section-h2 { font-size: 24px; }
    .layout-media-left, .layout-media-right { grid-template-columns: 1fr; gap: 18px; }
    .extra-grid { grid-template-columns: repeat(2,1fr); gap:12px; }
    .gallery-grid { grid-template-columns: repeat(2,1fr); }
  }
  @media (max-width: 460px) {
    .extra-grid, .gallery-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="root"></div>

<!-- Lightbox -->
<div class="lb" id="lb" onclick="closeLB()">
  <button class="lb-x" onclick="event.stopPropagation();closeLB()">×</button>
  <img id="lb-img" src="" alt="">
  <div class="lb-cap" id="lb-cap"></div>
</div>

<script>
const P = { cream:'#FFEDCE', peach:'#FFC193', coral:'#FF8383', red:'#FF3737',
            sage:'#C3CC9B', forest:'#546B41', ink:'#1F1A14', paper:'#FFFAF0' };

// Defaults — kept in sync with admin.html / index.html
const DEFAULT_PROJECTS = [
  {id:"p1",title:"Reimagining outpatient triage",client:"Nordic Health",role:"Lead Service Designer",year:"2025",tags:["Service Design","Healthcare","Research"],description:"End-to-end redesign.",cover:{hue:18,label:"Triage flow",imageUrl:""},
   caseStudy:{overview:"Brief context.",team:"1 PM, 2 Engineers, 1 Researcher",duration:"16 weeks",heroImage:"",sections:[
    {heading:"Discovery",body:"What we found in research.",layout:"media-left",images:[{label:"Research wall",url:""},{label:"Journey map",url:""}]},
    {heading:"Synthesis",body:"How insights became opportunities.",layout:"media-left",images:[{label:"Opportunity map",url:""},{label:"Workshop output",url:""}]},
    {heading:"Design & Delivery",body:"What shipped.",layout:"media-left",images:[{label:"Final UI 01",url:""},{label:"Final UI 02",url:""}]},
   ]}},
];

function loadData() {
  try { const s = localStorage.getItem('portfolio_data'); if (s) return JSON.parse(s); }
  catch(e) {}
  return null;
}

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function placeholder(label, hue) {
  const c1 = `hsl(${hue}, 65%, 70%)`;
  const c2 = `hsl(${(hue+30)%360}, 60%, 55%)`;
  return `<div class="ph" style="background:linear-gradient(135deg,${c1},${c2});">
    <span>${escapeHtml(label || 'image')}</span>
  </div>`;
}

function imgOrPh(url, label, hue) {
  if (url) return `<img src="${escapeHtml(url)}" alt="${escapeHtml(label||'')}" data-src="${escapeHtml(url)}" data-cap="${escapeHtml(label||'')}">`;
  return placeholder(label || 'image', hue);
}

const params = new URLSearchParams(location.search);
const id = params.get('id') || 'p1';

const data = loadData();
const projects = (data && data.projects) || DEFAULT_PROJECTS;
const project = projects.find(p => p.id === id) || projects[0];
const cs = project.caseStudy || (DEFAULT_PROJECTS[0].caseStudy);
const bioEmail = (data && data.bio && data.bio.email) || 'leena@markiet.studo';

document.title = `${project.title} — Leena Markiet`;
const hue = (project.cover && project.cover.hue) || 18;

function renderSection(sec, i) {
  const layout = sec.layout || 'media-left';
  const imgs = sec.images || [];
  const main = imgs[0];
  const extras = imgs.slice(1);

  const headHTML = `
    <div class="section-head">
      <span class="section-num">0${i+1}</span>
      <h2 class="section-h2">${escapeHtml(sec.heading)}</h2>
    </div>`;

  const bodyHTML = sec.body
    ? `<p class="section-body">${escapeHtml(sec.body)}</p>` : '';

  if (layout === 'text-only') {
    return `<section class="section">${headHTML}${bodyHTML}</section>`;
  }

  if (layout === 'gallery') {
    const items = imgs.map((im, j) => `
      <div>
        <div class="extra-thumb">${imgOrPh(im.url, im.label, hue + j*22)}</div>
        ${im.label ? `<div class="extra-cap" style="margin-top:6px;">${escapeHtml(im.label)}</div>` : ''}
      </div>`).join('');
    return `<section class="section">${headHTML}${bodyHTML}
      <div class="gallery-grid">${items}</div></section>`;
  }

  // media-left or media-right
  const mainHTML = main ? `
    <div>
      <div class="main-image-wrap">${imgOrPh(main.url, main.label, hue)}</div>
      ${main.label ? `<div class="main-image-cap">${escapeHtml(main.label)}</div>` : ''}
    </div>` : '';

  const textHTML = `<div>${bodyHTML}</div>`;

  const mediaRow = layout === 'media-right'
    ? `<div class="layout-media layout-media-right">${textHTML}${mainHTML}</div>`
    : `<div class="layout-media layout-media-left">${mainHTML}${textHTML}</div>`;

  const extrasHTML = extras.length ? `
    <div class="extra-grid">
      ${extras.map((im, j) => `
        <div class="extra-item">
          <div class="extra-thumb">${imgOrPh(im.url, im.label, hue + (j+1)*30)}</div>
          ${im.label ? `<div class="extra-cap">${escapeHtml(im.label)}</div>` : ''}
        </div>`).join('')}
    </div>` : '';

  return `<section class="section">${headHTML}${main ? mediaRow : bodyHTML}${extrasHTML}</section>`;
}

const sectionsHTML = (cs.sections || []).map(renderSection).join('');

const heroImageHTML = cs.heroImage ? `
  <div class="hero-img-wrap">
    <div class="hero-img">
      <img src="${escapeHtml(cs.heroImage)}" alt="${escapeHtml(project.title)}"
        data-src="${escapeHtml(cs.heroImage)}" data-cap="${escapeHtml(project.title)}">
    </div>
  </div>` : '';

document.getElementById('root').innerHTML = `
<div class="hd">
  <a href="index.html">← Back to portfolio</a>
  <span style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:rgba(31,26,20,0.45);">
    Case study / ${escapeHtml(project.year)}
  </span>
  <a href="admin.html?edit=${escapeHtml(project.id)}" style="opacity:0.5;">Edit ✎</a>
</div>

<header class="hero">
  <div aria-hidden class="blob-a" style="position:absolute;top:-100px;right:-60px;width:380px;height:380px;
    background:radial-gradient(closest-side,${P.red}44,transparent 70%);filter:blur(20px);pointer-events:none;"></div>
  <div aria-hidden class="blob-b" style="position:absolute;bottom:-120px;left:-80px;width:340px;height:340px;
    background:radial-gradient(closest-side,${P.peach}88,transparent 70%);filter:blur(24px);pointer-events:none;"></div>

  <div class="hero-content">
    <div class="hero-tags">
      ${(project.tags||[]).map(t => `<span class="hero-tag">${escapeHtml(t)}</span>`).join('')}
    </div>
    <h1 class="hero-h1">${escapeHtml(project.title)}</h1>
    <p class="hero-overview">${escapeHtml(cs.overview || project.description)}</p>
    <div class="meta-grid">
      ${[
        {k:'Client',  v: project.client},
        {k:'Role',    v: project.role},
        {k:'Year',    v: project.year},
        {k:'Team',    v: cs.team || '—'},
        {k:'Duration',v: cs.duration || '—'},
      ].map(m => `<div>
        <div class="meta-k">${escapeHtml(m.k)}</div>
        <div class="meta-v">${escapeHtml(m.v||'—')}</div>
      </div>`).join('')}
    </div>
  </div>
</header>

${heroImageHTML}

<div class="container">
  <div class="body">
    ${sectionsHTML}
    <div class="outro">
      <span class="outro-end">End of case study</span>
      <a class="cta" href="mailto:${escapeHtml(bioEmail)}">Talk about a project like this →</a>
    </div>
  </div>
</div>
`;

// Lightbox wiring — any <img data-src="..."> becomes clickable
const lb = document.getElementById('lb');
const lbImg = document.getElementById('lb-img');
const lbCap = document.getElementById('lb-cap');
function openLB(src, cap) {
  lbImg.src = src;
  lbCap.textContent = cap || '';
  lbCap.style.display = cap ? 'block' : 'none';
  lb.classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeLB() {
  lb.classList.remove('show');
  document.body.style.overflow = '';
  setTimeout(() => { lbImg.src = ''; }, 200);
}
window.closeLB = closeLB;
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLB(); });
document.querySelectorAll('img[data-src]').forEach(img => {
  img.style.cursor = 'zoom-in';
  img.addEventListener('click', (e) => {
    e.stopPropagation();
    openLB(img.dataset.src, img.dataset.cap);
  });
});
// Also clicking on any wrapper that has an image should open it
document.querySelectorAll('.main-image-wrap, .extra-thumb, .hero-img').forEach(w => {
  w.addEventListener('click', (e) => {
    const img = w.querySelector('img[data-src]');
    if (img) { e.stopPropagation(); openLB(img.dataset.src, img.dataset.cap); }
  });
});
</script>

</body>
</html>
